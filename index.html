<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienkert</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
background:radial-gradient(circle at bottom,#0b1d3a,#000010 70%);
font-family:Arial,sans-serif;
}

h1{
position:absolute;
top:45%;
width:100%;
text-align:center;
color:white;
font-size:55px;
text-shadow:0 0 20px #66ccff;
z-index:10;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.shooting{
position:absolute;
width:180px;
height:2px;
background:linear-gradient(to right,white,transparent);
transform:rotate(-35deg);
animation:shoot 6s linear infinite;
opacity:0;
}

@keyframes shoot{
0%{
transform:translate(-300px,-300px) rotate(-35deg);
opacity:0;
}
5%{
opacity:1;
}
20%{
transform:translate(1400px,800px) rotate(-35deg);
opacity:0;
}
100%{
opacity:0;
}
}
</style>
</head>

<body>

<h1>welcome to vienkert world</h1>
<h2>🌅 Sunset Gallery</h2>

<img src="sunset1.jpg" width="300">

<h2>🐈 My Cats</h2>

<img src="cat1.jpg" width="300">
<script>

// Stars
for(let i=0;i<250;i++){
let s=document.createElement("div");
s.className="star";
let size=Math.random()*3+1;
s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(Math.random()*3+1)+"s";
document.body.appendChild(s);
}

// Shooting stars
for(let i=0;i<5;i++){
let sh=document.createElement("div");
sh.className="shooting";
sh.style.top=Math.random()*40+"vh";
sh.style.left="-300px";
sh.style.animationDelay=(i*2)+"s";
document.body.appendChild(sh);
}

</script>

</body>
</html>
