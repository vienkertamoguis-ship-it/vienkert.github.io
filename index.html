<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vienkert Mystery Archive</title>

<style>

body{
margin:0;
padding:30px;
min-height:100vh;
background:linear-gradient(#000,#120000,#000);
color:white;
font-family:"Courier New",monospace;
}

h1{
text-align:center;
font-family:Georgia,serif;
color:#ff3333;
font-size:45px;
text-shadow:0 0 20px red;
}

.file{
margin-top:25px;
border:1px solid #660000;
padding:15px;
background:rgba(0,0,0,.7);
}

button{
background:none;
border:none;
color:#ff5555;
font-size:22px;
font-family:"Courier New",monospace;
cursor:pointer;
}

button:hover{
color:white;
text-shadow:0 0 15px red;
}

img{
width:300px;
margin-top:20px;
border:2px solid red;
box-shadow:0 0 15px red;
display:none;
}

</style>

</head>

<body>

<h1>VIENKERT MYSTERY ARCHIVE</h1>


<div class="file">
<button onclick="show(1)">📁 The Firmament</button>
<br>
<img id="img1" src="1166ab33555eb41a9792e4ab43706691.jpg">
</div>


<div class="file">
<button onclick="show(2)">📁 The Great Deep</button>
<br>
<img id="img2" src="17d097c189cfcdaed84c6b72f335c7f3.jpg">
</div>


<div class="file">
<button onclick="show(3)">📁 Agartha</button>
<br>
<img id="img3" src="2973f9403fef9d47c0aec637442192aa.jpg">
</div>


<div class="file">
<button onclick="show(4)">📁 The Water Is Universe</button>
<br>
<img id="img4" src="2c5beea18b382c7415505714884031cb.jpg">
</div>


<div class="file">
<button onclick="show(5)">📁 Hollow Earth</button>
<br>
<img id="img5" src="64d4ab2684bd1c8677ac6fb9e9fa7814.jpg">
</div>


<div class="file">
<button onclick="show(6)">📁 Types Of Alien</button>
<br>
<img id="img6" src="de4d4882e06ee17d67e6da7ed39c36e5.jpg">
</div>


<div class="file">
<button onclick="show(7)">📁 North Pole</button>
<br>
<img id="img7" src="e5fcbe6db004cb1f4ae9f44d35f1b032.jpg">
</div>


<script>

function show(num){

let img=document.getElementById("img"+num);

if(img.style.display=="block"){
img.style.display="none";
}
else{
img.style.display="block";
}

}

</script>


</body>
</html>
